{% extends 'portal/base.html' %}

{% block content %}
<h1>Новости предприятия</h1>
{% if news_list %}
    <div class="news-list">
        {% for news in news_list %}
            <article class="news-item">
                <h2>{{ news.title }}</h2>
                <p class="news-meta">{{ news.created_at|date:'d.m.Y H:i' }}</p>
                <div class="news-content">{{ news.content|linebreaks }}</div>
            </article>
        {% endfor %}
    </div>
{% else %}
    <p>Пока нет новостей.</p>
{% endif %}
{% endblock %}
