<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServiceHub</title>
    <link rel="stylesheet" href="{% static 'portal/style.css' %}">
</head>
<body>
    <header class="top-bar">
        <div class="brand">ServiceHub</div>
        <nav class="nav-links">
            {% if user.is_authenticated %}
                <a href="{% url 'portal-home' %}">Главная</a>
                <a href="{% url 'portal-requests' %}">Заявки</a>
                <a href="{% url 'portal-news' %}">Новости</a>
                <a href="{% url 'logout' %}">Выйти</a>
            {% endif %}
        </nav>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>Простой кроссплатформенный клиент доступа к внутренним сервисам предприятия.</p>
    </footer>
</body>
</html>
